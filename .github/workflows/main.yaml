name: CI workflow for Amazon clone website

on:
  push:
    branches:
      - main

  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *' # eveyday at 9 AM

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: code checkout
        uses: actions/checkout@v4
      
      - name: build the image
        run: |
          docker build --file docker/Dockerfile --tag amazon:v1.0.0 .

      - name: save the image
        run: |
          docker save -o amazon.tar amazon:v1.0.0

      - name: upload the image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: amazon-image
          path: amazon.tar

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    environment: prod
    steps:
      - name: download the image as artifact
        uses: actions/download-artifact@v4
        with:
          name: amazon-image

      - name: load the docker image
        run: |
          docker load -i amazon.tar

      - name: Trivy security checks
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          format: 'json'
          file-type: 'fs'
          image-ref: 'amazon:v1.0.0'
          vuln-type: 'os,library'
          exit-code: '1'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

  push:
    runs-on: ubuntu-latest
    needs: security_scan
    environment: prod
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: amazon-image

      - name: load the docker image
        run: |
          docker load -i amazon.tar

      - name: login to dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker image
        run: |
          docker tag amazon:v1.0.0 ${{ secrets.DOCKER_USERNAME }}/amazon:v1.0.0

      - name: upload image to docker registry
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/amazon:v1.0.0 
